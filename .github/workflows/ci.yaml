name: CI
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Lefthook
        uses: threeal/setup-lefthook-action@v1.0.0

      - name: Setup pnpm
        uses: ./
        with:
          version: 10.33.4

      - name: Check pre-commit hook
        run: lefthook run pre-commit --all-files

      - name: Test
        run: pnpm vitest run

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - ubuntu-22.04
          - ubuntu-22.04-arm
          - macos-15
          - macos-14
          - windows-2025
          - windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          path: setup-pnpm-action
          sparse-checkout: |
            action.yml
            dist
          sparse-checkout-cone-mode: false

      - name: Setup pnpm
        uses: ./setup-pnpm-action

      - name: Verify latest pnpm version
        shell: bash
        run: |
          version="$(pnpm --version)"
          echo "$version"
          test "$version" != "10.34.0"

      - name: Setup pnpm with version input
        uses: ./setup-pnpm-action
        with:
          version: 10.34.0

      - name: Verify specified pnpm version
        shell: bash
        run: |
          version="$(pnpm --version)"
          echo "$version"
          test "$version" = "10.34.0"
