name: CI
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: ./
        with:
          version: 10.33.4

      - name: Install dependencies
        run: pnpm install

      - name: Check formatting
        run: pnpm prettier --check .

      - name: Check lint
        run: pnpm eslint

      - name: Check types
        run: pnpm tsc

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm rollup -c && git diff --exit-code dist

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - ubuntu-22.04
          - ubuntu-22.04-arm
          - macos-15
          - macos-14
          - windows-2025
          - windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          path: setup-pnpm-action
          sparse-checkout: |
            action.yml
            dist
          sparse-checkout-cone-mode: false

      # TODO: Re-enable latest pnpm setup after
      # https://github.com/threeal/setup-pnpm-action/issues/195 is fixed.
      #
      # - name: Setup pnpm
      #   uses: ./setup-pnpm-action
      #
      # - name: Check pnpm
      #   run: pnpm --version

      - name: Setup pnpm with version input
        uses: ./setup-pnpm-action
        with:
          version: 9.15.5

      - name: Check pnpm
        run: pnpm --version
